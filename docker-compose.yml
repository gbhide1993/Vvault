services:

  db:
    image: ankane/pgvector
    container_name: vvault_db
    # Copy .env.example to .env and replace default credentials before first run
    environment:
      POSTGRES_DB: vvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: vvault_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env  
    environment:
      DB_HOST: db
      DB_NAME: vvault
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      # Place your .vvault-license file in this folder before running
      - .:/app

  frontend:
      build: ./frontend
      ports:
        - "3000:80"
        - "3443:443"
      depends_on:
        - backend
      volumes:
        - ./certs:/etc/nginx/certs:ro


  ollama:
    image: ollama/ollama
    container_name: vvault_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama    
    entrypoint: >
      sh -c "
      ollama serve &
      sleep 5 &&
      ollama pull phi3:mini &&
      ollama pull nomic-embed-text &&
      wait
      "

volumes:
  pgdata:
  ollama_data: